body:
  text: 附錄一火豈君相五志俱有論火之為病其害甚大其變甚速其勢甚彰其死甚暴何者蓋能燔灼焚焰飛走狂越消爍於物莫能御之遊行乎三焦虛實之兩途曰君火也猶人火也曰相火也猶龍火也火性不妄動能不違道於常以稟位聽命運行造化生存之機矣夫人在氣交之中多動少靜欲不妄動其可得乎故凡動者皆屬火龍火一妄行元氣受傷勢不兩立偏勝則病移他經事非細故動之極也病則死矣經所以謂一水不勝二火之火出於天造君相之外又有厥陰臟腑之火根於五志之內六慾七情激之其火隨起大怒則火起於肝醉飽則火起於胃房勞則火起於腎悲哀動中則火起於肺心為君主自焚則死矣丹溪又啟火出五臟主病曰諸風掉眩屬於肝火之動也諸痛瘡瘍屬於心火之用也諸氣憤郁屬於肺火之升也諸濕腫滿屬於脾火之勝也經所謂一水不勝五火之火出自人為又考內經病機一十九條內舉屬火者五諸熱瞀瘈皆屬於火諸驚禁慓如喪神守皆屬於火諸氣逆上皆屬於火諸躁擾狂越皆屬於火諸病跗腫疼酸驚駭皆屬於火而河間又廣其說火之致病者甚多深契內經之意曰喘嘔吐酸暴注下迫轉筋小便渾濁腹脹大鼓之有聲癰疽瘍疹瘤氣結核吐下霍亂瞀郁腫脹鼻塞鼻衄血溢血泄淋閉身熱惡寒戰慄驚惑悲笑譫妄衄蔑血汙之病皆少陽君火之火乃真心小腸之氣所為也若瞀瘈暴喑冒昧躁擾狂越罵詈驚駭跗腫痠痛氣逆上衝禁慄如喪神守嚏嘔瘡瘍喉啞耳鳴及聾嘔湧溢食不下目眛不明暴注瞤瘈暴病暴死此皆少陽相火之熱乃心包絡三焦之氣所為也是皆火之變見於諸病也謂為脈虛則浮大實則洪數藥之所主各因其屬君火者心火也可以濕伏可以水滅可以直折惟黃連之屬可以制之相火者龍火也不可以濕折之從其性而伏之惟黃柏之屬可以降之噫瀉火之法豈止如此虛實多端不可不察以臟氣司之如黃連瀉心火黃芩瀉肺火芍藥瀉脾火柴胡瀉肝火知母瀉腎火此皆苦寒之味能瀉有餘之火耳若飲食勞倦內傷元氣火不兩立為陽虛之病以甘溫之劑除之如黃耆人參甘草之屬若陰微陽強相火熾盛以乘陰位日漸煎熬為火虛之病以甘寒之劑降之如當歸地黃之屬若心火亢極鬱熱內實為陽強之病以鹹冷之劑折之如大黃朴硝之屬若腎水受傷其陰失守無根之火為虛之病以壯水之劑制之如生地黃玄參之屬若右腎命門火衰為陽脫之病以溫熱之劑濟之如附子乾薑之屬若胃虛過食冷物抑遏陽氣於脾土為火鬱之病以升散之劑發之如升麻乾葛柴胡防風之屬不明諸此之類而求火之為病施治何所依據故於諸經集略其說略備處方之用庶免實實虛虛之禍也二氣屬陽動作火論捍衛沖和不息之謂氣擾亂妄動變常之謂火當其和平之時外護其表復行於里周流一身循環無端出入升降繼而有常源出中焦總統於肺氣曷嘗病於人也及其七情之交攻五志之間發乖戾失常清者遽變之為濁行者抑遏而反止表失衛護而不和內失健悍而少降營運漸遠肺失主持妄動不已五志厥陽之火起焉上燔於肺氣乃病焉何者氣本屬陽反勝則為火矣河間曰五志過極則為火也何後世不本此議而一概類聚香辛燥熱之劑氣作寒治所據何理且言七氣湯製作其用青皮陳皮三稜蓬朮益智官桂甘草遂以為平和可常用通治七情所傷混同一意未喻其藥以治真氣以下諸氣尤有甚焉者茲不復敘況所居之情各各不同且夫經言九氣之變未嘗略而不詳如怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收熱則氣泄驚則氣亂勞則氣耗思則氣結其言治法高者抑之下者舉之寒者熱之熱者寒之驚者平之勞者溫之結者散之喜者以恐升之悲者以喜勝之九氣之治各有分別何嘗混作寒治論而類聚香熱之藥通言而治諸氣豈理之謂歟若香辛燥熱之劑但可劫滯氣沖快於一時以其氣久抑滯藉此暫行開發之意藥中無佐使制服所起之氣服之甚則增熾鬱火蒸熏氣液而成積自積滋長而成痰一飲下膈氣乃氤氳清虛之象若霧露之著物雖滯易散內挾痰積開而復結服之日久安有虛實而不動氣動而不散者乎此皆人所受誤之由習俗已久相沿而化卒莫能救升發太過香辛散氣燥熱傷氣真氣耗散濁氣上騰猶曰腎虛不能攝氣歸原遂與蘇子降氣湯四磨湯下黑鉛丹養氣丹鎮墜上升之氣且硫黃黑錫佐以香熱又無補養之性藉此果能生氣而補腎乎請熟詳之夫濕痰盛甚者亦或當之初服未顯增變由其喜墜而愈進形質弱者何以收救不悟肺受火炎子氣亦弱降令不行火無以制相扇而動本勢空虛命絕如縷積而至深丹毒濟火一旦火氣狂散喘息奔急而死所以有形丹石瓦藥重墜無形之氣其氣將何抵受隨而降之乎譬以石投水水固未嘗沉也豈不死歟丹溪有曰上升之氣自肝而出中挾相火其熱愈甚自覺無冷非真冷也火熱似水積熱之甚陽亢陰微故有此證認假作真似是之禍可勝言哉內經雖云百病皆生於氣以正氣受邪之不一也今七情傷氣鬱結不舒痞悶壅塞發為諸病當詳所起之因滯於何經有上下部分藏氣之不同隨經用藥有寒熱溫涼之同異若枳殼利肺氣多服損胸中至高之氣青皮瀉肝氣多服損真氣與夫木香之行中下焦氣香附之快滯氣陳皮之泄氣藿香之馨香上行胃氣紫蘇之散表氣厚朴之瀉衛氣檳榔之瀉至高之氣沉香之升降其氣腦麝之散真氣若此之類氣實可宜其中有行散者有損泄者其過劑乎用之能卻氣之標而不能治氣之本豈可又佐以燥熱之藥以火濟火混同謂治諸氣使之常服多服可乎氣之與火一理而已動靜之變反化為二氣作火論治與病情相得丹溪發揮論云冷生氣者出於高陽生之謬言也自非身受寒氣口食寒物而足論寒者吾恐十之無一二也三血屬陰難成易虧論內經曰榮者水穀之精也和調五臟灑陳於六腑乃能入於脈也源源而來生化於脾總統於心藏於脾肝宣布於肺施泄於腎灌溉一身目得之而能視耳得之而能聽手得之而能攝掌得之而能握足得之而能步藏得之而能液腑得之而能氣是以出入升降濡潤宣通者由此使然也注之於脈少則澀充則實常以飲食日滋故能陽生陰長液汗變化而赤為血也生化旺則諸經恃此而長養衰耗竭則百脈由此而空虛可不謹養哉故曰血者神氣也持之則存失之則亡是知血盛則形盛血弱則形衰神靜則陰生形役則陽亢陽盛則陰必衰又何言陽旺而生陰血也蓋謂血氣之常陰從乎陽隨氣運行於內而無陰以羈束則氣何以樹立故其致病也易而調治也難以其比陽常虧而又損之則陽易亢陰易乏之論可以見矣諸經有云陽道實陰道虛陽道常饒陰道常乏陽常有餘陰常不足以人之生也年至十四而經行至四十九而經斷可見陰血之難成易虧知此陰氣一虧傷所變之證妄行於上則吐衄衰涸於外則虛勞妄返於下則便紅稍血熱則膀胱癃閉溺血滲透腸間則為腸風陰虛陽搏則為崩中濕蒸熱瘀則為滯下熱極腐化則為膿血火極似水血色紫黑熱盛於陰發於瘡瘍濕滯於血則為痛癢癮疹皮膚則為冷痹蓄之在上則人喜忘蓄之在下則為喜狂墮恐跌僕則瘀惡內凝若分部位身半以上同天之陽身半以下同地之陰此特舉其所顯之證者治血必血屬之藥欲求血藥其四物之謂乎河間謂隨證輔佐謂之六合湯者詳言之矣余故陳其氣味專司之要不可不察夫川芎血中之氣藥也通肝經性味辛散能行血滯於氣也地黃血中血藥也通腎經性味甘寒能生真陰之虛也當歸分三治血中主藥通腎經性味辛溫全用能活血各歸其經也芍藥陰分藥也通脾經性味酸寒能和血氣腹痛也若求陰藥之屬必於此而取則焉脾胃論有云若善治者隨經損益損其一二味之所宜為主治可也此特論血病而求血藥之屬者也若氣虛血弱又當從長沙血虛以人參補之陽旺則生陰血也若四物者獨能主血分受傷為氣不虛也輔佐之屬若桃仁紅花蘇子血竭牡丹皮者血滯所宜蒲黃阿膠地榆百草霜櫚灰者血崩所宜乳香沒藥五靈脂凌霄花者血痛所宜蓯蓉鎖陽牛膝枸杞子益母草夏枯草敗龜板者血虛所宜乳酪血液之物血燥所宜乾薑桂者血寒所宜生地黃苦參血熱所宜此特取其正治之大略耳以其觸類而長可謂無窮之應變矣四滯下辯論滯下之病嘗見世方以赤白而分寒熱妄用兜澀燥劑止之或言積滯而用巴䗯丸藥攻之或指濕熱而與淡滲之劑利之一偏之誤可不明辯乎謹按原病式所論赤白同於一理反復陳喻但不熟察耳果腸胃積滯不行法當辛苦寒涼藥推陳致新盪滌而去不宜巴䗯毒熱下之否則鬱結轉甚而病變危者有之矣若瀉痢不分兩證混言濕熱不利小便非其治也夫泄者水穀濕之象滯下者垢瘀之物同於濕熱而成治分兩岐而藥亦異若淡滲之劑功能散利水道濁流得快使泄自止此有無之形豈可與滯下混同論治而用導滯行積可乎其下痢出於大腸傳送之道了不幹於腎氣所下有形之物或如魚腦或下如豆汁或便白膿或下純血或赤或白或赤白相雜若此者豈可與瀉混同論治而用淡滲利之可乎嘗原其本皆由腸胃日受飲食之積余不盡行留滯於內濕蒸熱瘀鬱結日深伏而不作時逢炎暑不行相火司令又調攝失宜復感酷熱之毒至秋陽氣始收火氣下降蒸發蓄積而滯下之證作矣以其積滯之滯行故名之曰滯下其濕熱瘀積干於血分則赤干於氣分則白赤白兼下氣血俱受邪矣久而不愈氣血不運脾積不磨陳積脫滑下凝猶若魚腦矣甚則腸胃空虛關司失守濁液並流色非一類錯雜混下注出狀如豆汁矣若脾氣下陷虛坐努責便出色如白膿矣其熱傷血深濕毒相瘀黏結紫色則紫黑矣其汙濁積而欲出氣滯而不與之出所以下迫窘痛後重裡急至圊而不能便總行頻並亦少乍起乍止而不安此皆大腸經有所壅遏窒礙氣液不得宣通故也眾言難處何法則可求之長沙論云利之可下者悉用大黃之劑可溫者悉用姜附之類何嘗以巴䗯熱毒下之緊澀重藥兜之又觀河間立言後重則宜下腹痛則宜和身重則宜溫脈弦則去風膿血黏稠以重藥竭之身冷自汗以重藥溫之風邪內束宜汗之鶩溏為痢當溫之在表者汗之在裡者下之在上者湧之在下者竭之身表熱者內疏之小便澀者分利之用藥輕重之別又加詳載行血則便膿自愈調氣則後重自除治實治虛之要論而丹溪又謂大虛大寒者其治驗備載局方發揮觀此治法豈可膠柱而調瑟又有胃弱而閉不食此名禁口痢病七方未有詳論者以內經大法推之內格嘔逆火起炎上之象究乎此則胃虛木火乘之是土敗木賊也見此多成危候五三消之疾燥熱勝陰嘗讀劉河間先生三消之論始言天地六氣五味以配養人身六味五臟而究乎萬物之源終引內經論渴諸證以辯乎世方熱藥之誤此比物立象反復詳明非深達陰陽造化之機者孰能如是邪請陳其略夫經中有言心肺氣厥而渴者有腎熱而渴者有言胃與大腸結熱而渴者有言脾痹而渴者有因小腸痹熱而渴者有因傷飽肥甘而食渴者有因醉飽入房而渴者有因遠行勞倦遇天熱而渴者有因傷害胃干而渴者有因腎熱而渴者有因痛風而渴者雖五臟之部分不同而病之所遇各異其為燥熱之疾一也三消之熱本濕寒之陰氣衰燥熱之陽氣大甚皆因乎飲食之餌失節腸胃乾涸而氣液不得宣平或耗亂精神過違其度或因大病陰氣損而血液衰虛陽氣悍而燥熱鬱甚或因久嗜咸物恣食炙爆飲食過度亦有年少服金石丸散積久實熱結於下焦虛熱血氣不能制實熱燥甚於腎故渴而不飲若飲水多而小便多者名曰消渴若飲食多而不甚渴小便數而消瘦者名曰消中若渴而飲水不絕腿消瘦而小便有脂液者名曰腎消此三消者其燥熱同也故治疾者補腎水陰寒之虛而瀉心火陽熱之實除腸胃燥熱之甚濟一身津液之衰使道路散而不結津液生而不枯氣血利而不澀則病日已矣豈不以滋潤之劑養陰以制燥滋水而充液哉何故泄漏消渴多者不知其書謂因下部腎水虛不能制其上焦心火使上實熱而多煩渴下虛冷而多小便若更服寒藥則元氣轉虛而下部腎水轉衰則上焦心火尤難治也但以暖藥補養元氣若下部腎水得實而勝退上焦心火則自然渴止小便如常而病愈也籲若此未明陰陽虛實之道也夫腎水屬陰而本寒虛則為熱心火屬陽而本熱虛則為寒若腎水陰虛則心火陽實是謂陽實陰虛而上下俱熱矣以彼人言但見消渴數溲妄言為下部寒爾豈知腸胃燥熱怫鬱使之然也且夫寒物屬陰能養水而瀉心熱物屬陽能養火而耗水今腎水既不能勝心火則上下俱熱奈何以熱養腎水欲令勝心火豈不暗哉彼不謂水氣實者必能制火虛則不能制火故陽實陰虛而熱燥其液小便淋而常少陰實陽虛不能制水小便利而常多此又不知消渴小便多者蓋燥熱太甚而三焦腸胃之腠理怫鬱結滯緻密壅塞而水液不能滲泄浸潤於外以養乎百骸故腸胃之外燥熱太甚雖多飲水入於腸胃之內終不能浸潤於外故渴不止而小便多水液既不能滲泄浸潤於外則陰燥竭而無以自養故久而多變為聾盲瘡瘍痤痱之類而危殆其為燥熱傷陰也明矣六泄瀉從濕治有多法泄瀉者水瀉所為也由濕本土土乃脾胃之氣也得此證者或因於內傷或感於外邪皆能動乎脾濕脾病則升舉之氣下陷濕變注並出大腸之道以胃與大腸同乎陽明一經也云濕可成泄垂教治濕大意而言後世方論泥云治濕不利小便非其治也故凡泄瀉之藥多用淡滲之劑利之下久不止不分所得之因遽以為寒而用緊澀熱藥兜之夫泄有五飧泄者水穀不化而完出濕兼風也溏泄者所下汁積黏垢濕兼熱也鶩泄者所下澄澈清冷小便清白濕兼寒也濡泄者體重軟弱泄下多水濕自甚也滑泄者久下不能禁固濕勝氣脫也若此有寒熱虛實之不同舉治不可執一而言謹書數法於後夫泄有宜汗解者經言春傷於風夏必飧泄又云久風為飧泄若保命集云用蒼朮麻黃防風之屬是也有宜下而保安者若長沙言下痢脈滑而數者有宿食也當下之下利已瘥至其時復發者此為下未盡更下之安悉用大承氣湯加減之劑有宜化而得安者格致餘論夏月患泄百方不效視之久病而神亦瘁小便少而赤脈滑而頗弦格悶食減因悟此久積所為積濕成痰留於肺中宜大腸之不固也清其源則流自清以茱萸等作湯溫服一碗許探喉中一吐痰半升如利減半次早晨飲吐半升而利止有以補養而愈者若脾胃論言脈弦氣弱自汗四肢發熱大便泄瀉從黃耆建中湯有宜調和脾濕而得止者若潔古言曰四肢懶倦小便不利大便走泄沉困飲食減少以白朮芍藥茯苓加減治之有宜升舉而安者若試效方言胃中濕脾弱不能運行食下則為泄助甲膽風勝以克之以升陽之藥羌活獨活升麻防風炙甘草之屬有宜燥濕而後除者若脾胃論言上濕有餘脈緩怠惰嗜臥四肢不收大便泄瀉從平胃散有宜寒涼而愈者若長沙言協熱自利者黃芩湯主之舉其濕熱之相宜者若長沙言下利脈遲緊痛未欲止當溫之下利心痛急當救里下利清白水液澄澈可與理中四逆湯輩究其利小便之相宜者河間言濕勝則濡泄小便不利者可與五苓散益元散分導之以其收斂之相宜者東垣言寒滑氣泄不固制訶子散澀之以上諸法各有所主宜獨利小便而濕動也豈獨病因寒必待龍骨石脂緊重燥毒之屬澀之治者又當審擇其說一途取利約而不博可乎
