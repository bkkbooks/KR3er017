body:
  text: 卷之三婦人科經水經水經候過期而作痛者乃虛中有熱所以作痛經水不及期血熱也四物湯加黃連經候將來而作痛者血實也桃仁香附黃連過期乃血少也川芎當歸帶人參白朮與痰藥過期紫黑色有塊血熱也必作痛四物湯加黃連香附淡色過期者乃痰多也二陳湯加川芎當歸紫色成塊者乃是熱也四物湯加黃連之類痰多占住血海地位因而下多者目必漸昏肥人如此南星蒼朮香附川芎作丸服肥人不及日數而多者痰多血虛有熱前方加黃連白朮若血枯經閉者四物湯加桃仁紅花軀肥脂滿經閉者導痰湯加芎連不可服地黃泥膈故也如用以生薑汁炒血崩崩之為病乃血之大下豈可為寒但血去後其人必虛當大補氣血東垣有治法但不言熱其主於寒學者宜再思之急則治其標白芷湯調百草霜甚者棕櫚皮灰後用四物湯加乾薑調理因勞者用參耆帶升補藥因寒者加乾薑因熱者加黃芩參耆崩過多者先服五靈脂末一服當分寒熱五靈脂能行能止婦人血崩用白芷香附為丸白帶用椒目末又用白芷末一方用生狗頭骨燒灰存性或酒調服或入藥服之又方用五靈脂半生半熟為末以酒調服氣虛血虛者皆於四物湯加人參黃耆漏下乃熱而虛者四物湯加黃連帶下赤白赤屬血白屬氣主治燥濕為先帶漏俱是胃中痰積流下滲入膀胱宜升無人知此肥人多是濕痰海石半夏南星蒼朮川芎椿皮黃柏瘦人帶病少如有帶者是熱也黃柏滑石川芎椿皮海石甚者上必用吐以提其氣下用二陳湯加蒼朮白朮仍用丸子一本作瓦龍子又云赤白帶皆屬於熱出於大腸小腸之分一方黃荊子炒焦為末米飲湯下治白帶亦治心痛羅先生治法或十棗湯或神祐丸或玉燭散皆可用不可峻攻實者可用此法虛則不宜血虛者加減四物湯氣虛者以參朮陳皮間與之濕甚者用固腸丸相火動者於諸藥中少加炒柏滑者加龍骨赤石脂滯者加葵花性燥者加黃連寒月少入姜附臨機應變必須斷厚味良薑芍藥黃柏二錢各燒灰入椿樹皮末一兩半上為末粥為丸每服三四十丸痰氣帶下者蒼朮香附滑石蛤粉半夏茯苓婦人上有頭風鼻涕下有白帶南星蒼朮黃柏炒焦滑石半夏川芎辛夷牡蠣粉炒茯苓白帶並痛風半夏茯苓川芎陳皮甘草蒼朮炒浸南星牛膝黃柏酒浸曬乾炒子嗣肥盛婦人不能孕育者以其身中脂膜閉塞子宮而致經事不能行可用導痰湯之類瘦怯婦人不能孕育者以子宮無血精氣不聚故也可用四物湯養血養陰等藥産前胎動孕婦人因火動胎逆上作喘者急用條黃芩香附之類將條芩更於水中沉取重者用之固胎地黃半錢人參白芍各一錢白朮一錢半川芎歸身尾一錢陳皮一錢甘草二錢糯米一十四粒黃連些小黃柏些小桑上羊兒藤七葉完者上㕮咀煎湯服之血虛不安者用阿膠痛者縮砂行氣故也一切病不可表惡阻從痰治戴云惡阻者謂婦人有孕噁心阻其飲食者是也肥者有痰瘦者有熱多用二陳湯或白朮為末水丸隨所好或湯或水下婦人懷妊愛物乃一臟之虛假如肝臟虛其肝氣止能生胎無餘物也血塊死血食積痰飲成塊在兩脅動作腹鳴嘈雜眩暈身熱時作時止黃連一兩一半用茱萸炒去茱萸一半益智炒去益智山梔半兩炒臺芎半兩香附一兩用便浸蘿蔔子一兩半炒山楂一兩三稜青皮神麯各半兩莪朮半兩用米醋煮桃仁半兩留尖去皮白芥子一兩半炒瓦龍子消血塊為末作丸子服之婦人血塊如盤有孕難服峻削香附四兩醋煮桃仁一兩去皮尖海石一兩醋煮白朮一兩為末神麯為丸束胎束胎丸第八個月服黃芩酒炒夏用一兩秋用七錢半冬用半兩茯苓七錢半陳皮二兩忌火白朮二兩粥為丸束胎散即達生散人參半錢陳皮半錢白朮白芍歸身尾各一錢甘草二錢炙大腹皮三錢紫蘇半錢或加枳殼砂仁作一帖入青蔥五葉黃楊木葉梢十個煎待於八九個月服十數帖甚得力或夏加黃芩冬不必加春加川芎或有別證以意消息第九個月服黃芩一兩酒炒宜熱藥不宜涼藥怯弱人減半白朮一兩枳殼七錢半炒滑石七錢半臨月十日前小便多時減此一味上為末粥為丸如梧桐子大每服三十丸空心熱湯下不可多恐損元氣安胎白朮黃芩炒麵粥為丸黃芩安胎乃上中二焦藥能降火下行縮砂安胎治痛行氣故也益母草即茺蔚子治産前産後諸病能行血養血難産作膏地黃膏牛膝膏胎漏氣虛血虛血熱戴云胎漏者謂婦人有胎而血漏下也子腫濕多戴云子腫者謂孕婦手足或頭面通身浮腫者是也用山梔炒一合米飲湯吞下三因方中有鯉魚湯難産難産之由亦是八九個月內不謹者氣血虛故亦有氣血凝滯而不能轉運者催生方白芷灰滑石百草霜上為末芎歸湯或薑汁調服之治胎衣不下婦人大全方別有治法産後血暈虛火載血漸漸暈來用鹿角燒灰出火毒研為極細末以好酒調灌下即醒行血極快也又方用韭葉細切盛於有嘴瓶中以熱醋沃之急封其口以嘴塞産婦鼻中可愈眩暈産後補虛人參白朮各二錢黃芩陳皮川芎各半錢歸身尾半錢甘草一錢炙有熱加生薑三錢茯苓一錢必用大補氣血雖有雜證以末治之當清熱補血氣消血塊滑石二錢沒藥一錢麒麟竭一錢無則用牡丹皮為末醋糊作丸瓦龍子能消血塊泄川芎黃芩白朮茯苓乾薑滑石白芍炒陳皮㕮咀煎湯服惡露不盡謂産後敗血所去不盡在小腹作痛五靈脂香附末蛤粉醋丸甚者入桃仁不去尖如惡血不下以五靈脂為末神麯糊丸白朮陳皮湯下中風不可作風治切不可以小續命湯服之必大補氣血然後治痰當以左右手脈分其氣血多少而治口眼喎斜不可服小續命湯發熱惡寒大發熱必用乾薑輕用茯苓淡滲其熱一應苦寒熱發表藥皆不可用也才見身熱便不可表發熱惡寒皆是氣血左手脈不足補血藥多於補氣藥右手脈不足補氣藥多於補血藥惡寒發熱腹滿者當去惡血脈滿者不是腹痛者是産後不可下白芍以其酸寒伐生髮之氣故也産後一切病皆不可發散小兒科小兒食積痰熱傷乳為病大概肝與脾病多小兒肝病多及大人亦然肝只是有余腎只是不足吐瀉黃疸三稜莪朮陳皮青皮神麯麥芽甘草白朮茯苓黃連上為末水調服傷乳吐瀉者加山楂時氣吐瀉者加滑石發熱者加薄荷吐瀉用益元散錢氏五補五瀉之藥俱可用急慢驚風發熱口瘡手心伏熱痰熱痰喘痰嗽並用通法重則用瓜蒂散輕則用苦參赤小豆末須酸齏汁調服吐之後用通聖散蜜丸服之驚有二證一者熱痰主急驚當直瀉之一者脾虛乃為慢驚所主多死當養脾東垣云慢驚者先實脾土後散風邪急者只用降火下痰養血慢者只用硃砂安神丸更於血藥中求之黑龍丸牛膽南星礞石各一兩焰硝等分煅天竺黃青黛各半兩蘆薈二兩半硃砂三錢殭蠶五分蜈蚣二錢半燒存性上為細末煎甘草湯膏丸如雞頭大每服一丸或二丸急驚薄荷湯下慢驚桔梗白朮湯下神聖牛黃奪命散檳榔半兩木香三錢大黃二兩麵裹煨熟為末白牽牛一兩一半炒一半生用黑牽牛粗末一半生用一半炒用上為一處研作細末入輕粉少許每服二錢用蜜漿水調下不拘時候微利為度疳病胡黃連丸胡黃連半錢去果積阿魏一錢半醋煮去肉積麝香四粒神麯二錢半去食積黃連二錢半炒去熱積上為末豬膽汁丸如黍米大每服二十丸白朮湯下小兒疳病腹大胡黃連丸二十丸白朮湯下痘瘡分氣虛血虛補之氣虛用人參白朮加解毒藥但見紅點便忌升麻葛根湯發得表虛也吐瀉少食為裡虛不吐瀉能食為實裡實而補則結癰腫陷伏倒靨灰白為表虛或用燒人屎黑陷甚者燒人屎紅活綻凸為表實而復用表藥則要潰爛不結痂二者俱見為表裡俱虛痘瘡或初出或未出時人有患者宜預服此藥多者合少重者合輕方用絲瓜近蒂三寸連瓜子皮燒灰存性為末砂糖拌吃入硃砂末亦可解痘瘡毒藥絲瓜升麻酒芍藥甘草生用糖球黑豆犀角赤小豆解痘瘡法已出未出皆可用硃砂為末以蜜水調服多者可減少者可無腹脹蘿蔔子蒸紫蘇梗陳皮乾薑各等分甘草減半食減者加白朮煎服夜啼人參一錢半黃連一錢半薑汁炒甘草半錢竹葉二十片作二服加姜一片煎服之口糜戴云滿口生瘡者便是江茶粉草敷之又方苦參黃丹五倍子青黛各等分敷之脫囊腫大戴云脫囊者陰囊腫大墜下不收上之說木通甘草黃連當歸黃芩煎服脫囊紫蘇葉為末水調敷上荷葉裹之脫肛戴云脫肛者大腸脫下之說東北方陳壁上土湯泡先熏後洗亦可用脫囊藥服之木舌戴云木舌者舌腫硬不和軟也又言重舌者亦是此類二者蓋是熱病用百草霜滑石芒硝為末酒調敷癮疹黑斑紅斑瘡癢用通聖散調服咯紅戴云咯紅者即唾內有血非吐血與咳血黑豆甘草陳皮煎服吃泥胃熱故也軟石膏甘草黃芩陳皮茯苓白朮煎服痢疾食積黃芩黃連陳皮甘草煎服赤痢加紅花桃仁白痢加滑石末食積痢炒曲蒼朮滑石芍藥黃芩白朮甘草陳皮茯苓上㕮咀煎下保和丸解顱乃是母氣虛與熱多耳戴云即初生小兒頭上骨未合而開者上以四君子湯四物湯有熱加酒芩炒黃連生甘草煎服外以帛束緊用白蘞末敷之蛔蟲楝樹根為君佐以二陳湯煎服口噤鬱金藜蘆瓜蒂為末搐鼻風痰南星半兩切白礬半兩入器中水高一指浸曬乾研細末白附子一兩用飛白麵為丸如雞頭大每服一丸或二丸姜蜜薄荷湯化下服之癩頭用紅炭焠長流水令熱洗之又服酒製通聖散除大黃酒炒外以胡荽子伏龍肝懸龍尾黃連白礬為末調敷又方松樹厚皮一兩燒灰白膠香二兩熬沸傾石上黃丹一兩飛白礬半兩火飛軟石膏一兩黃連半兩大黃五錢輕粉四釐上極細末熬熟油調敷瘡上須先洗了瘡口敷乃佳赤瘤生地黃木通荊芥苦藥帶表之類用巴蕉油塗患處鼻赤雄黃黃丹同敷一小兒好吃粽成腹痛黃連白酒藥為末調服乃愈
