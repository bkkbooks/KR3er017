body:
  text: 卷第一中風大率主血虛有痰以治痰為先或虛挾火與濕亦有死血留滯者外中於風者亦有中氣者當從痰治順氣化痰若口開手撒眼合遺尿吐沫直視喉如鼾睡肉脫筋痛者皆不治半身不遂大率多痰在左屬死血無血在右屬痰有熱氣虛病若在左者四物湯等加桃仁紅花竹瀝薑汁在右者二陳湯四君子等加竹瀝薑汁痰壅盛者口眼喎斜者不能言者皆當吐吐法輕用瓜蒂蝦汁皂角重用藜蘆半錢或三分加麝香灌入鼻內或口內吐痰出一吐不已再吐之亦有虛而不可吐者氣虛卒倒參耆補之氣虛有痰濃參湯合竹瀝薑汁血虛宜四物湯俱用薑汁炒恐泥痰再加竹瀝薑汁入內服能食者去竹瀝加荊瀝又法以豬牙皂角白礬等分為末薑湯調下名稀涎散血虛者四物湯補之挾痰者亦用薑汁竹瀝脈訣內言諸不治證見則不可治筋枯者不治舉動則筋痛者是筋枯以其無血滋潤故也治痰氣實能食用荊瀝氣虛少食用竹瀝此二味用開經絡行血氣入四物湯中必用薑汁助之肥白人多濕少用附子烏頭行經初昏倒急掐人中至醒然後用去痰藥二陳湯四物四君子等湯加減用六郁戴云郁者結聚而不得發越也當升者不得升當降者不得降當變化者不得變化也此為傳化失常六郁之病見矣氣鬱者胸脅痛脈沉澀濕鬱者周身走痛或關節痛遇陰寒則發脈沉細痰鬱者動則即喘寸口脈沉滑熱鬱者瞀小便赤脈沉數血鬱者四肢無力能食便紅脈沉食鬱者噯酸腹飽不能食人迎脈平和氣口脈緊盛者是也氣血中和萬病不生一有怫鬱諸病生焉氣鬱香附子蒼朮川芎濕鬱蒼朮川芎白芷痰鬱海石香附南星栝蔞熱鬱青黛香附蒼朮川芎梔子血鬱桃仁紅花青黛川芎香附食鬱蒼朮香附針沙醋炒山楂神麯炒春加芎夏加苦參秋冬加吳茱萸越鞠丸解諸郁又名芎術丸蒼朮香附撫芎神麯梔子等分為末水丸如綠豆大凡郁皆在中焦以蒼朮撫芎開提其氣以升之假如食在氣上提其氣則食自降余皆仿此癩大風病是受得天地間殺物之氣古人謂之癘風者以其酷烈暴悍可畏耳人得之者須分在上在下夫在上者以醉仙散取涎血於齒縫中出在下者以通天散取惡物陳蟲於穀道中出取出雖有道路之異然皆不外乎陽明一經治此證者須知此意看其疙瘩與瘡上先見者上體多者在上也下先見者下體多者在下也上下同得者在上覆在下也陽明胃經與大腸無物不受此風之入人也氣受之則在上多血受之則在下多血氣俱受之者上下俱多也自非醫者神手病者鐵心罕有免此夫從上從下以漸而來者皆可治人見其病勢之緩多忽之雖按法施治病已痊可若不能忌口絕色皆不免再發發則終於不能救也余曾治五人中間惟一婦人不再發以其貧甚而且寡無物可吃也餘四人三四年後皆再發孫真人云吾嘗治四五十人終無一人免於死非真人不能治蓋無一人能守禁忌耳此婦人本病藥外又服百餘帖加減四物湯半年之上方得經行十分安愈治法在上者醉仙散在下者通天再造散後用通神散及三稜針於委中出血但不能忌口絕房者不治之也醉仙散胡麻仁牛蒡子蔓荊子枸杞子各半兩為粗末同炒紫色白蒺藜苦參栝蔞根防風各半兩上八味為細末每一兩半入輕粉三錢拌勻大人一錢空心日午臨睡各一服淡茶調下五七日間必於齒縫中出臭涎水渾身覺痛昏悶如醉利下惡臭屎為度量大小虛實加減與之證候重而急者須以再造散下之候補養得還復與此藥吃須斷鹽醬醋諸般魚肉椒料果子燒炙等物止可淡粥及淡煮熟時菜食之茄尚不可食惟有烏稍蛇菜花蛇可以淡酒煮熟食之以助藥力再造散鬱金半兩生用大黃一兩炮皂角刺一兩黑者大者白牽牛頭末六錢半炒半生用之上為末五錢臨夜冷酒調下以淨桶伺候泄出蟲如蟲口黑色乃是多年蟲口如赤色是近者三數日又進一服直候無蟲即絕根也寒主乎溫散有卒中天地之寒氣有口傷生冷之物戴云此傷寒謂身受肅殺之氣口食冰水瓜果冷物之類病者必脈沉細手足冷息微身倦雖身熱亦不渴倦言語或遇熱病誤用此法輕者至重重者至死凡脈數者或飲水者或煩躁動搖者皆是熱病寒熱二證若水火也不可得而同治誤即殺人學者慎之傷寒傷寒必須身犯寒氣口食寒物者從補中益氣湯中加發散藥屬內傷者十居八九其法邪之所湊其氣必虛只用補中益氣湯中從所見之證出入加減氣虛熱甚者少用附子以行參耆之劑如果氣虛者方可用此法以上傷寒治法可用於南方不宜北暑戴云暑乃夏月炎暑也盛熱之氣著人也有冒有傷有中三者有輕重之分虛實之辯或腹痛水瀉者胃與大腸受之噁心者胃口有痰飲也此二者冒暑也可用黃連香薷飲蓋黃連退暑熱香薷消蓄水或身熱頭疼躁亂不寧者或身如針刺者此為熱傷在分肉也當以解毒白虎湯加柴胡氣如虛者加人參或咳嗽發寒熱盜汗出不止脈數者熱在肺經用清肺湯柴胡天水散之類急治則可遲則不可治矣或火乘金也此為中暑凡治病須要明白辨別慎勿滾同施治春秋間亦或有之切莫執一隨病處方為妙黃連香薷飲挾痰加半夏乘虛加人參黃耆或清暑益氣湯加減用之注夏屬陰虛元氣不足戴云秋初夏末頭痛腳軟食少體熱者是也補中益氣湯去柴胡升麻加炒黃柏挾痰止用南星半夏陳皮之類或生脈散出千金方暑風戴云暑風者夏月卒倒不省人事者是也有因火者有因痰者火君相二火也暑天地二火也內外合而炎爍所以卒倒也痰者人身之痰飲也因暑氣入而鼓激痰飲塞凝心之竅道則手足不知動躡而卒倒也此二者皆可吐內經曰火鬱則發之挾火挾痰實者可用吐法吐即發散也量其虛實而吐之吐醒後可用清劑調治之濕戴云濕有自外入者有自內出者必審其方土之致病源東南地下多陰雨地濕凡受必從外入多自下起以重腿腳氣者多治當汗散久者宜疏通滲泄西北地高人多食生冷濕面或飲酒後寒氣怫鬱濕不能越作腹皮脹痛甚則水鼓脹滿或通身浮腫如泥按之不起此皆自內而出也辨其元氣多少而通利其二便責其根在內也此方土內外亦互相有之但多少不同須對證施治不可執一本草蒼朮治濕上下俱可用二陳湯加酒芩羌活蒼朮散風之藥行濕最妙內傷內傷病退後燥渴不解者有餘熱在肺家可用參苓甘草少許薑汁冷服或茶匙挑薑汁與之虛者可用人參湯世之病此者為多但有挾痰者有挾外邪者有熱鬱於內而發者皆以補元氣為主看其所挾之病而兼用藥火有可發者二風寒外來者可發郁者可發陰虛火動難治火鬱當發看何經輕者可降重則從其性升之實火可瀉小便降火極速凡氣有餘便是火火急甚重者必緩之生甘草兼瀉兼緩人參白朮亦可人壯氣實火盛顛狂者可用正治或硝冰水飲之人虛火盛狂者可用生薑湯與之若投以冰水正治立死有補陰即火自降者炒黃柏地黃之類山梔子仁大能降火從小便泄去其性能屈曲下行降火人所不知凡火盛者不可驟用涼藥必用溫散又方左金丸治肝火黃連六兩茱萸一兩或半兩水為丸白湯下五十丸傷風戴云新咳嗽鼻塞聲重者是也屬肺者多散宜辛溫或辛涼之劑發斑屬風熱戴云斑有色點而無頭粒者是如有頭粒即疹也風熱挾痰而作自里而發於外通聖散消息當以微汗而散之下之非理也內傷斑者胃氣極虛一身火遊行於外所致宜補以降之發斑似傷寒者痰熱之病發於外微汗以散之下之非理也疹戴云疹浮小有頭粒者是隨出即收收則又出者是也非若斑之無頭粒也當明辨之屬熱與痰在肺清肺火降痰或解散出汗亦有可下者溫病眾人病一般者是也又謂之天行時疫有三法宜補宜降宜散又方大黃黃芩黃連人參桔梗防風蒼朮滑石香附人中黃上為末神麯為丸每服五七十丸分氣血痰作湯使氣虛四君子湯血虛四物湯痰多二陳湯送下如熱甚者可用童子小便送下大頭天行病東垣有方羌活酒芩大黃酒蒸冬溫為病非其時而有其氣者冬時君子當閉藏而反發泄於外專用補藥帶表又方以竹筒兩頭留節中作一竅納甘草於中仍以竹木釘閉竅於大糞缸中浸一月取出曬乾專治疫毒瘧有風有暑有食老瘧瘧母痰病老瘧病此係風暑入陰分在臟用血藥川芎撫芎紅花當歸加蒼朮白朮白芷黃柏甘草煎露一宿次早服之無汗要有汗散邪為主帶補有汗要無汗正氣為主帶散有瘧母者用丸藥消導醋煮鱉甲為君三稜蓬朮香附隨證加減三日一發者受病一年間發者受病半年一日一發者受病一月連二日發者住一日者氣血俱受病一日間一日者補藥帶表藥後用瘧丹截之在陰分者用藥徹起在陽分方可截之又方草果知母檳榔烏梅常山甘草炙穿山甲炮用水酒一大碗煎至半碗露一宿臨發日前二時溫服如吐則順之截瘧青蒿丸青蒿一兩冬青葉二兩馬鞭草二兩官桂二兩上三葉皆曬乾秤為末法丸如胡椒子大每兩作四服於當發前一時服盡大法暑風必當發汗夏月多在風涼處歇遂閉其汗而不泄因食者從食上治瘧而虛者須先用參朮一二帖托住其氣不使下陷後用他藥治內傷挾外邪者同法內必主痰必以汗解二陳湯加常山柴胡黃芩草果瘧而甚者發寒熱頭痛如破渴而飲水自汗可與參耆朮苓連梔子川芎蒼朮半夏等治久病瘧二陳湯加川芎蒼朮柴胡葛根白朮一補一發咳嗽風寒火主降火勞肺脹火鬱痰主降痰戴云風寒者鼻塞聲重惡寒者是也火者有聲痰少面赤者是也勞者盜汗出兼痰者多作寒熱肺脹者動則喘滿氣急息重痰者嗽動便有痰聲痰出嗽止五者大概耳亦當明其是否也風寒行痰開腠理二陳湯加麻黃杏仁桔梗火降火清金化痰勞四物湯中加竹瀝薑汁必以補陰為主肺脹而嗽者用訶子青黛杏仁訶子能治肺氣因火傷極遂成郁遏脹滿取其味酸苦有收斂降火之功佐以海蛤粉香附栝蔞青黛半夏曲食積痰作嗽發熱者半夏南星為君栝蔞蘿蔔子為臣青黛石鹼為使火鬱嗽者訶子海石栝蔞青黛半夏香附咳嗽聲嘶者此血虛受熱也用青黛蛤粉蜜調服久嗽風入肺用鵝管石雄黃鬱金款冬花碾末和艾中以生薑一片留舌上灸之以煙入喉中為度乾咳嗽者難治此係火鬱之證乃痰鬱火邪在中用苦梗以開之下用補陰降火不已則成勞倒倉好此證不得志者有之嗽而脅痛宜疏肝氣用青皮等方在後二陳湯內加南星香附青黛薑汁治嗽藥大概多用生薑者以其辛散也上半日嗽多者屬胃中有火貝母石膏能降胃火午後嗽多者此屬陰虛必用四物湯加知母黃柏先降其火五更嗽多者此胃中有食積至此時候流入肺金知母地骨皮降肺火火氣浮於肺者不宜用涼藥用五味五倍斂而降之有痰因火逆上者先治火後治其痰也肺虛甚者用參膏此好色腎虛有之以生薑陳皮佐之大概有痰者可加痰藥治之治嗽多用粟殼不必疑但要先云病根此乃收後之藥也師云陰分嗽者多屬陰虛治之也有嗽而肺脹壅遏不得眠者難治治嗽煙筒佛耳草款冬花鵝管石上為末用紙卷燒其煙燻之或白湯調亦得治嗽有痰天突肺腧二穴灸治嗽泄火熱大瀉肺氣三椎骨下橫過各一寸半是穴嗽春是春升之氣用清藥二陳加薄荊之類夏是火炎上最重芩連秋是濕熱傷肺冬是風寒外來用藥發散之後以半夏必逐去痰庶不再來又方治嗽劫藥五味子半兩五倍子一錢甘草二錢半風化硝一錢為末以蜜為丸噙化之痰脈浮當吐凡治痰用利藥過多致脾氣下虛則痰反易生多濕痰用蒼朮老痰海石半夏栝蔞子香附五倍子熱痰用青黛黃連食積痰神麯麥蘖山楂子痰在腸胃間者可下而愈痰在經絡中者非吐不可出吐法中就有發散之義也膈上之痰必用吐之瀉亦不能去也氣實痰熱結在上者則吐吐難得出或成塊或吐咯不出氣滯兼郁者此則難治矣膠固者必用吐之吐法兼用牙茶齏水薑汁醋少許栝蔞散少許加防風桔梗皆升動其氣便吐也吐法用附子尖桔梗蘆人參蘆瓜蒂砒不甚用藜蘆艾葉末茶上藥此皆自吐不用手探但藥但湯皆可吐吐法先以布搭膊勒腰於不通風處行此法蘿蔔子半升擂和以漿水一碗濾去粗入少油與蜜旋至半溫服後以鵝翎探吐凡用鵝翎須以桐油浸卻以皂角水洗去肥曬乾用之又法用蝦帶殼半斤入醬蔥姜等料物煮汁先吃蝦後飲汁以翎勾引吐必須緊勒肚腹二陳湯一身之痰都能管如在下加下引藥如在上加上引藥凡人身上中下有塊者多是痰也問其平日好食何物吐下後用藥許學士用蒼朮治痰飲成窠囊一邊行極效痰挾瘀血遂成窠囊痰之清者屬寒用二陳湯之類內傷挾痰必用人參黃耆白朮之屬多用薑汁傳送或用半夏之屬虛甚者宜加竹瀝痰熱者多挾風外證為多濕者多軟如身倦而重之類熱者清之食積者必用攻之兼氣虛者用補氣藥補之因火盛逆上者治火為先白朮黃芩石膏之類中氣不足則加人參白朮痰之為物隨氣升降無處不到脾虛者清中氣二陳加白朮之類兼用提藥中焦有痰與食積胃氣賴其所養卒不便虛若攻之盡則虛矣眩暈嘈雜乃火動其痰用二陳湯加梔子芩連類噫氣吞酸此係食鬱有熱火氣上動以黃芩為君南星半夏為臣橘紅佐之熱多者加青黛痰在脅下非白芥子不能達痰在皮裡膜外者非薑汁竹瀝不可達痰在膈間使人顛狂健忘宜用竹瀝風痰亦服竹瀝又能養血痰在四肢非竹瀝不開痰結核在咽喉燥不能出入化痰藥加軟堅咸藥杏仁海石桔梗連翹栝蔞仁少佐朴硝以薑汁蜜調丸噙化之海粉即海石熱痰能降濕痰能燥結痰能軟頑痰能消可入丸子末子不可入煎藥黃芩治熱痰假以降其熱也竹瀝滑痰非薑汁不能行經絡也枳實瀉痰能沖牆壁五倍子能治老痰小胃丹治膈上痰熱風痰濕痰肩膊諸痛然能損胃氣食積痰實者用之不宜多青礞石丸去濕痰重在風化硝潤下丸降痰最妙陳皮半斤去白以水化鹽半兩拌陳皮令得所煮候乾炒燥一方不去白甘草一兩炙上為末蒸餅丸綠豆大每服三十五丸溫水下油炒半夏大治濕痰又治喘止心痛粥丸薑湯下三十丸痰方黃芩空心香附半夏薑製貝母以上治濕痰加栝蔞仁青黛作丸子治熱痰中和丸治濕痰氣熱蒼朮黃芩香附半夏各等分為末粥丸燥濕痰方亦治白濁因痰者南星一兩半夏一兩蛤粉二兩青黛為衣上為末神麯糊丸痰嗽方黃芩一兩半酒浸洗滑石半兩貝母一兩南星一兩風化硝二錢半白芥子半兩去殼上為末湯浸蒸餅為丸導痰湯半夏四兩南星橘皮枳殼赤茯苓一兩甘草半兩用生薑煎服之千緡湯半夏七枚泡製四片破之皂角一寸二分去皮炙甘草一寸炙生薑如指大煎服之治喘治痰方南星半夏滑石輕粉各三錢巴豆三十粒上用皂角仁浸濃汁丸如梧桐子大每服五十丸黃連化痰丸黃連一兩陳皮五錢吳茱萸一錢酒浸半夏一兩五錢上為末入桃仁二十四個研如泥和勻神麯糊丸如綠豆大每服百丸薑湯送下消痰方益元散七錢吳茱萸三錢治郁痰方白殭蠶杏仁栝蔞訶子貝母喘戴云有痰喘有氣急喘有胃虛喘有火炎上喘痰喘者凡喘便有痰聲氣急喘者呼吸急促而無痰聲有胃虛喘者抬肩擷肚喘而不休火炎上喘者乍進乍退得食則減食已則喘大概胃中有實火膈上有稠痰得食咽墜下稠痰喘即止稍久食已入胃反助其火痰再升上喘反大作俗不知此作胃虛治以燥熱之藥者以火濟火也昔葉都督患此諸醫作胃虛治之不愈後以導水丸利五六次而安矣凡久喘未發以扶正氣為要已發以攻邪為主有氣虛短氣而喘有痰亦短氣而喘有陰虛自小腹下火起而上者喘急有風痰者婦人大全方千緡湯陰虛有痰喘急者補陰降火四物湯加枳殼半夏氣虛者人參蜜炙黃柏麥門冬地骨皮之類大概喘急之病甚不可用苦藥涼藥火氣盛故也可用導痰湯加千緡湯治之諸喘不止者用劫藥一二帖則止之劫藥之後因痰治痰因火治火椒目碾極細末用一二錢以生薑湯調下止之又法用蘿蔔子蒸熟為君皂角燒灰等分為末以生薑汁煉蜜為丸小桐子大每服五七十丸噙化下之效哮專主於痰宜吐法治哮必用薄滋味不可純用涼藥必帶表散治哮方用雞子略敲殼損膜不損浸於尿缸內三四日夜取出煮熟食之效蓋雞子能去風痰痢身熱後重腹痛下血戴云痢雖有赤白二色終無寒熱之分通作濕熱治但分新舊更量元氣用藥與赤白帶同身熱挾外感不惡寒小柴胡湯去人參惡寒發熱為表證宜微汗和解蒼朮川芎陳皮芍藥甘草生薑煎服後重積與氣鬱墜下兼升兼消或氣行血和積少但虛坐努力此為亡血倍用歸身尾卻以生芍藥生地黃桃仁佐之復以陳皮和之或下痢而大孔痛者此因熱流於下也用木香檳榔黃芩黃連炒乾薑或痢退減十之七八積已盡糟粕未實當炒芍藥炒白朮炙甘草陳皮茯苓湯下固腸丸三十粒然固腸丸性躁有去濕實腸之功恐滯氣未盡者不可遽用此藥只宜單服此湯可也或痢後糟粕未實或食稍多或飢甚方食腹中作痛者切勿驚恐以白朮陳皮各半盞煎服和之則安或久痢後體虛氣弱滑泄不止又當以訶子肉豆蔻白礬半夏之類擇用以澀之甚則加牡蠣然須以陳皮為佐若大澀亦能作痛又甚者灸大樞氣海古方用厚朴為瀉凝滯之氣然樸太溫而散氣久服大能虛人滯氣稍行即去之余滯未盡以炒枳殼陳皮然枳殼亦能耗氣比之厚朴少緩比陳皮亦重滯退一半當去之只用陳皮以和諸藥陳皮去白有補瀉之兼才若為參朮之佐亦能補也凡痢疾腹痛必以白芍藥甘草為君當歸白朮為佐惡寒痛者加桂惡熱痛者加黃柏達者更能參以歲氣時令用藥則萬舉萬全豈在乎執方哉諸不治證下痢純血者必死下痢如塵腐色者死下痢如屋漏者死下痢如竹筒注者不可治下痢如魚腦者半生半死禁口痢胃口熱甚故也黃連多加人參煮湯終日呷之如吐了再吃開以降之人不知此多用溫藥甘味此以火濟火以滯益滯哀哉一方臍中用田螺盦之以引下其熱亦有誤服熱藥澀藥之毒犯胃者當明審以祛其毒痢方亦作丸大黃黃連黃芩黃柏枳殼當歸白芍藥滑石甘草桃仁白朮各等分上為末神麯糊丸孫郎中因飲水過多腹脹瀉痢帶白蒼朮白朮厚朴茯苓滑石上煎下保和丸小兒八歲下痢純血以食積治蒼朮白朮黃芩白芍滑石茯苓甘草陳皮炒曲上煎下保和丸又下痢法熱不止者屬陰虛用寒涼藥兼升藥藥熱泄瀉濕氣虛火痰食積戴云凡瀉水腹不痛者是濕也飲食入胃不住或完穀不化者是氣虛也腹痛瀉水腹鳴痛一陣瀉一陣是火也或瀉時或不瀉或多或少是痰也腹痛甚而瀉瀉後痛減者是食積也濕燥濕兼滲泄之四苓散加蒼朮白朮甚者二術炒氣虛人參白朮芍藥炒升麻火宜伐火利小水黃芩木通入四苓散痰積宜豁之海石青黛黃芩神麯蛤粉或用吐法食積宜消導疏滌之神麯大黃以上諸藥皆作丸子服之凡泄瀉水多者仍用五苓散治之世俗類用澀藥治痢與瀉若積久而虛者或可行之而初得之者恐必變他疾為禍不小矣殊不知多因於濕惟分利小水最為上策止瀉方肉豆蔻五錢滑石春冬一兩二錢半夏二兩半秋二兩又方姜曲丸陳曲六兩炒陳麥亦可茴香五錢生薑一兩上炒白朮炒曲炒芍藥或丸或散或湯作丸妙脾泄治一老人奉養大過飲食傷脾常常泄瀉亦是脾泄之疾白朮二兩炒白芍藥一兩酒拌炒神麯一兩半炒山楂一兩半炒半夏一兩洗黃芩五錢炒上為末荷葉包飯煨為丸治一老人年七十面白脈弦數獨胃脈沉滑因飲白酒作痢下血淡水膿後腹痛小便不利裡急後重參朮為君甘草滑石檳榔木香蒼朮最少下保和丸二十五丸第二日前證俱減獨小便不利以益元散服之霍亂戴云霍亂者吐也有聲有物凡有聲無物而躁亂者謂之乾霍亂也轉筋不住男子以手挽其陰女子以手牽其乳近兩旁邊此乃千金妙法也內有所積外有所感陽不升陰不降乖隔而成矣切勿以米湯吃之立死脈多伏為絕見成吐瀉還用吐提其氣起大法生薑理中湯最好有可吐者有可下者吐用二陳湯加減亦可或梓樹木煎湯吐亦可乾霍亂此病最難治死在須臾升降不通故也此係內有物所傷外有邪氣所遏有用吐法者則兼發散之義也吐提其氣極是良法世多用鹽湯有用溫藥解散者其法解散不用涼藥二陳湯加和解散川芎防風蒼朮白芷嘔吐凡有聲有物謂之嘔吐有聲無物謂之噦有痰膈中焦食不得下者有氣逆者有寒氣鬱於胃口者胃中有痰有熱者然胃中有火與痰而致嘔吐者多矣朱奉議以半夏生薑橘皮為主孫真人誤以噦為咳逆劉河間謂嘔者火氣炎上此特一端耳胃中有熱膈上有痰二陳湯加炒梔子黃連生薑久病嘔者胃虛不納穀也以生薑人參黃耆白朮香附噁心有熱有痰有虛戴云噁心者無聲無物但心中欲吐不吐欲嘔不嘔雖曰噁心非心經之病其病皆在胃口上宜用生薑蓋能開胃豁痰也皆用生薑隨證用藥翻胃即膈噎膈噎乃翻胃之漸發揮備言戴云翻胃有四血虛氣虛有熱有痰血虛者脈必數而無力氣虛者脈必緩而無力氣血俱虛者則口中多出沫但見沫大出者必死有熱者脈數而有力有痰者脈滑數二者可治血虛者四物為主氣虛者四君子為主熱以解毒為主痰以二陳為主大約有四血虛氣虛有熱有痰兼病必用童便竹瀝薑汁牛羊乳糞如羊屎者斷不可治大腸無血故也痰用二陳湯為主寸關脈沉或伏而大有氣滯結者通氣之藥皆可用也寸關脈沉而澀氣虛四君子湯為主血虛四物湯為主左手脈無力大不可用香燥之藥服之必死宜薄滋味馬剝兒燒灰存性一錢重好棗肉平胃散二錢溫酒調服食即可下然後隨病源調理神效陳皮三斤三兩厚朴三斤二兩甘草三十兩蒼朮五斤傷食戴云惡食者胸中有物導痰補脾二陳湯加白朮山楂川芎蒼朮痞食積兼濕東垣有法有方又痞滿方吳茱萸三兩黃連八兩粥為丸軟石膏碾末醋丸如綠豆大瀉胃火食積痰噯氣胃中有火有痰南星半夏軟石膏莎草根或湯或丸吞酸戴云濕熱在胃口上飲食入胃被濕熱鬱遏其食不得傳化故作酸也如穀肉在器濕熱則易酸也必用茱萸順其性而折之反佐茱萸黃連嘈雜只是痰因火動戴云此即俗謂之心嘈也梔子姜炒黃連不可無梔子黃芩為君南星半夏橘皮熱多加青黛肥人嘈雜二陳湯加撫芎用蒼朮白朮炒梔子五疸不用分五同是濕熱如盦曲相似戴云五疸者周身皮膚並眼如梔子水染因食積黃者量其虛實下其食積其餘但利小便為先小便利白即黃自退輕者小溫中丸重者大溫中丸熱多者加黃連濕多者茵陳五苓散加食積藥消渴泄瀉先用白朮白芍藥炒為末調服後卻服消渴藥消渴養肺降火生血為主分上中下治黃連末天花粉末人乳生藕汁生地黃汁上二物汁為膏入上藥搜和佐以薑汁和蜜湯為膏徐徐留於舌上白湯少許送下能食加軟石膏栝蔞根治消渴神藥水腫戴云水腫者通身皮膚光腫如泡者是也以健脾滲水利小便進飲食元氣實者可下此因脾虛不能制水水漬妄行當以參朮補脾氣得實則自能健運自能升降運動其樞機則水自行非五苓之行水也宜補中行濕利小便切不可下二陳湯加白朮人參為主佐以蒼朮炒梔子黃芩麥門冬制肝木若腹脹少佐厚朴氣不運加木香木通氣若陷下升麻柴胡提之隨證加減必須補中產後必用大補氣血為主少佐以蒼朮茯苓使水自降用大劑白朮補脾壅滿用半夏陳皮香附監之有熱當清肺麥門冬黃芩之屬一方用山梔子去皮取仁炒捶碎米飲送下若胃脘熱病在上者帶皮用鼓脹又名單鼓其詳在格致論中大補中氣行濕此乃脾虛之甚須必遠音樂斷厚味以大劑人參白朮佐以陳皮茯苓蒼朮之類有血虛當以四物湯行血脈實兼人壯盛者或可用攻藥便用收拾白朮為主厚朴治腹脹因味辛以散其氣在中焦故也自汗屬氣虛濕熱陽虛東垣有法有方人參黃耆少佐桂枝陽虛附子亦可用撲法牡蠣麩皮藁本糯米防風白芷麻黃根為末周身撲之火氣上蒸胃中之濕亦能作汗涼膈散主之痰證亦有汗者盜汗血虛陰虛戴云盜汗者睡則汗自出覺則無矣非若自汗而自出也小兒不須治東垣有法有方當歸大黃湯盜汗方白朮四兩一兩用黃耆同炒一兩用石斛同炒一兩用牡蠣末同炒一兩用麩皮同炒各微黃色余藥不用只用白朮上為細末每服三錢用粟米湯調下盡四兩效吃逆有痰氣虛陰火視其有餘不足治之戴云吃逆者因痰與熱胃火者極多不足者人參白朮湯下大補丸有餘並痰者吐之人參蘆之屬頭風有痰者多左屬風荊芥薄荷屬血虛川芎當歸芍藥右屬痰蒼朮半夏屬熱黃芩搐藥有用蓽茇豬膽頭痛多主於痰痛甚者火多亦有可吐者亦有可下者清空膏治諸般頭痛除血虛頭痛不治血虛頭痛自魚尾上攻頭痛必用川芎當歸湯古方有追涎藥出東垣試效羌活防風黃連各炒一兩柴胡七錢川芎二錢甘草一兩半炙黃芩三兩刮去黃色銼碎一半酒炒一半上為末每服二錢匕熱盞內入茶少許湯調如膏抹在口內少用湯送下臨臥服之頭眩痰挾氣虛火治痰為主挾補氣藥並降火藥屬痰無痰則不能作眩屬火痰因火動又有濕痰者有火多者左手脈數熱多脈澀有死血右手脈實痰積脈大必是久病眩暈火動其痰二陳湯加黃芩蒼朮羌活散風行濕或用防風行濕之劑可也昔有一老婦患赤白帶一年半是頭眩坐立不久睡之則安專用治赤白帶除之其眩自安矣眉稜痛風熱痰作風痰治類痛風白朮酒黃芩末茶調服又方川烏頭草烏二味為君童便浸洗炒去毒細辛黃芩羌活甘草佐之耳聾少陽厥陰熱多皆屬於熱耳鳴者是戴云亦有氣閉者蓋亦是熱氣閉者耳不鳴也蓖麻子四十九粒棗肉十個上入人乳搗成膏子石頭上略曬乾便丸如桐子大以綿裹塞於耳中又方用鼠膽入耳中尤好仍開痰散風熱大病後須用四物湯降火有陰虛火動耳聾者亦如上法
