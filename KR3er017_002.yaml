body:
  text: 卷第二心痛即胃脘痛心痛雖日數多不吃飲食不死若痛方止便吃還痛必須三五服藥後方可吃物大凡心膈之痛須分新久若明知身受寒氣口食寒物而病於初得之時當以溫散或溫利之藥若曰病得之稍久則成郁矣鬱則蒸熱熱則久必生火原病式中備言之矣若欲行溫散寧無助火添病耶由是古方中多以山梔為熱藥之嚮導則邪伏而病易退正易復而病易安雖然病安之後若縱恣口味不改前非病復作時必難治之也山梔炒去皮每十五個濃煎湯一呷入生薑汁令辣再煎小沸服或入芎一錢尤妙山梔大者用七個或九個大概胃口有熱而作痛非山梔子不可佐以薑汁或半夏橘紅各五黃芩三甘草一用二陳湯加蒼芎倍加炒梔痛甚者加炒乾姜從之反治之法心痛輕者散之麻黃桂枝重者加石鹼川芎蒼朮梔子必炒去皮用作丸服之凡治病必須先問平日起居如何假如心痛有因平日喜食熱物以致血流於胃口作痛用桃仁承氣湯下之切記輕者用韭汁桔梗能開提氣血藥中兼用之以物拄按痛則止者挾虛也以二陳湯加炒乾姜和之有蟲痛者面上白斑唇紅能食屬蟲治苦楝根錫灰之類脈堅實不大便者下之痛甚者脈必伏多用溫藥不用參朮可用附子諸痛不可用補氣藥客寒犯胃草豆蔻丸用之熱亦可用止用一二服草豆蔻一錢四分裹燒熱去皮吳茱萸湯泡洗去梗焙乾益智仁白殭蠶橘皮人參黃耆以上各八分生甘草歸身炙甘草桂皮各六分曲末薑黃各四分桃仁七個去皮半夏一錢洗麥蘖一錢半炒黃澤瀉一錢小便多減半用之柴胡四分詳膈下痛多為用之上一十八味除桃仁另研如泥外余極細末同桃仁研勻用湯泡蒸餅為丸如桐子大每服三十丸食遠用熱白湯送下旋斟酌多少用之又方用黃荊子炒焦為末米飲調服亦治白帶又方脾痛用海蛤粉佐以香附末用川芎山梔生薑煎辣湯調服為佳又方單用牡粉酒調下一二錢氣實不可用腰痛濕熱腎虛瘀血濕熱腰痛者遇天陰或坐久而發者是腎虛者疼之不已者是也瘀血者日輕夜重者是也脈大者腎虛用杜仲龜板黃柏知母枸杞五味之類用豬脊髓丸脈澀者瘀血用補陰丸中加桃仁紅花濕熱者用蒼朮杜仲黃柏川芎痰者用南星凡諸痛皆屬火寒涼藥不可峻用必用溫散之藥諸痛不可用人參蓋人參補氣氣旺不通而痛愈甚矣臍下忽大痛者人中如黑色者多死難治也人面上忽有紅點者多死脅痛肝火盛木氣實有死血肝急有痰流注木氣實川芎蒼朮青皮當歸龍會丸瀉火要藥死血桃仁紅花川芎痰流注二陳湯加南星蒼朮川芎肝苦急急食辛以散之用撫芎蒼朮血病入血藥中行血脅痛甚者用薑汁下龍會丸肝火盛故也咳嗽脅痛二陳湯加南星多香附青皮青黛薑汁腹痛有寒積熱死血食積濕痰戴云寒痛者綿綿痛而無增減者是時痛時止者是熱也死血痛者每痛有處不行移者是也食積者甚欲大便利後痛減者是濕痰者凡痛必小便不利脈弦強者食脈滑者痰滑痰多作腹痛用苔芎蒼朮香附白芷生薑汁入湯服腹中水鳴乃火擊動其水也二陳湯加黃芩黃連梔子凡心腹痛必用溫散此是鬱結不散阻氣不運故病在下者多屬食宜溫散之一老人腹痛年高不禁下者用川芎蒼朮香附白芷乾薑茯苓滑石痛風四肢百節走痛風熱風濕血虛有痰大法主方蒼朮南星川芎白芷當歸酒黃芩在上者加羌活桂枝桔梗威靈仙在下者加牛膝防己木通黃柏血虛者多用川芎當歸佐以桃仁紅花薄桂治痛風無味而薄者獨此能橫行手臂領南星蒼朮等治之上中下痛風方威靈仙三錢南星二兩苔芎二兩桃仁五錢白芷五錢桂枝三錢防己半錢蒼朮二兩黃柏二兩酒浸炒紅花一錢半羌活三錢神麯一兩炒草龍膽五分張子元氣血虛有痰濁陰火痛風人參一兩白朮二兩黃柏二兩炒黑色山藥一兩海石一兩鎖陽五錢乾薑五錢燒灰南星一兩敗龜板二兩酒炙熟地黃二兩粥為丸治臂痛半夏一錢陳皮五分茯苓五分蒼朮一錢半酒芩一錢威靈仙三分白朮一錢甘草少許炒南星一錢香附一錢勞瘵其主在乎陰虛痰與血病青蒿一斗五升童便三斗文武火熬約童便減二斗去蒿熬至一斗入豬膽汁七個再熬數沸甘草末收之虛勞身瘦屬火因火燒爍勞病四物湯加人尿薑汁咳血痰盛身熱多是血虛戴云咳血者嗽出痰內有血者是嘔血者嘔全血者是咯血者每咯出血皆是血疙瘩衄血者鼻中出血也溺血小便出血也下血者大便出血也雖有名色分六俱是熱證但有虛實新舊之不同或妄言為寒者誤也青黛訶子山梔海石栝蔞仁上為末薑汁蜜調噙化嗽甚者加杏仁後以八物湯加減調理身熱多是血虛四物湯加減嘔血火載血上錯經妄行脈大發熱喉中痛者是氣虛用人參黃耆蜜炙黃柏荊芥並當歸生地黃用之嘔血用韭汁童便薑汁磨鬱金同飲之其血自清火載血上錯經妄行四物湯加炒梔子童便薑汁山茶花童便薑汁酒調鬱金末治吐血入薑汁童便痰帶血絲出者童便薑汁竹瀝又方用韭汁童便二物相吞用鬱金細研入在二物之內同飲其血自消又方治衄血以鬱金如無鬱金以茶薑汁童便和好酒調服即止之咯血薑汁童便青黛入血藥中用之加四物湯地黃膏牛膝膏之類衄血涼血行血為主犀角地黃湯入鬱金同用經血逆行或血腥或唾血吐血用韭葉汁立效溺血屬熱山梔子炒水煎服或用小薊琥珀有血虛者四物湯加牛膝膏下血不可純用寒涼藥必於寒涼藥中用辛味並溫如酒浸炒涼藥酒煮黃連之類有熱四物湯加炒梔子升麻秦艽阿膠珠下血屬虛當歸散四物湯加炮乾薑升麻又方用白芷五倍子丸凡用血藥不可單行單止有風邪下陷宜升提之蓋風傷肝肝生血故也有濕傷血宜行濕消熱可也內經謂身熱即死寒則生此亦是大概言之必兼證詳之則可今豈無身熱生寒而死者脈沉小流連或微者易治脈浮大洪數者難愈宜滑不宜弦仲景治痢可溫者五法可清者十法或解表或利小便或待其自已區分易治難治極密但與瀉同立法不分學者當辨之大孔痛一曰溫之一曰清之久病身冷自汗脈沉小者宜溫暴病身熱脈浮洪者宜清有可吐者有可下者有可汗者初得時原氣未虛必推蕩之此通用之法稍久氣虛則不可先水泄後膿血此脾傳腎賊邪難愈先膿血後水泄此腎傳脾微邪易愈如豆汁者濕也蓋脾胃為水穀之海無物不受常兼四臟故如五色之相雜當先通利此迎而奪之之義如虛者亦宜審之因熱而作不可用巴豆等藥如傷冷物者或可用亦宜謹之又有時疫作痢一方一家之內上下傳染相似卻宜明運氣之勝復以治之腸風獨在胃與大腸出黃芩秦艽槐角升麻青黛夢遺專主熱脫精戴云因夢交而出精者謂之夢遺不因夢而自泄精者謂之精滑皆相火所動久則有虛而無寒者也帶下與夢遺同法治青黛海石黃柏即椿樹根丸內傷氣血不能固守當補以八物湯加減吞椿樹根丸思想成病其病在心安神帶補熱則流通知母黃柏蛤粉精滑專主濕熱戴云滑者小便精滑下也俱是膀胱濕熱雖有赤白之異終無寒熱之別河間云天氣熱則水渾濁寒則澄徹清冷由此觀之濁之為病濕熱明矣黃柏知母牡蠣蛤粉又方良薑三錢芍藥二錢黃柏二錢燒灰存性樗樹皮白皮一兩半上為末糊為丸每服三十丸濁濕熱有痰有虛赤濁屬血白濁屬氣寒則堅凝熱則流通大率皆是濕熱流注宜燥中宮之濕用二陳湯加蒼朮白朮燥去濕赤者乃是濕傷血加白芍藥仍用珍珠粉丸加椿樹根皮滑石青黛等作丸虛勞者用補陰藥大概不利熱藥肥白人必多痰以二陳湯去其熱胃弱者兼用人參以柴胡升麻升胃中之氣丸藥用青黛黃柏炒褐色乾薑炒微黑色海石蛤粉胃中濁氣下流為赤白濁者用柴胡升麻蒼朮白朮二陳湯丸藥用樗末蛤粉炒薑炒黃柏專主胃中之濁氣下流滲入膀胱用青黛蛤粉肝脈弦者用青黛以瀉肝又方黃柏一兩炒黑生柏二錢半一作三兩海石二兩神麯五錢為末水丸有熱者黃柏滑石青黛之類燥濕痰南星半夏蛤粉上神麯為丸青黛為衣或用海石代曲張子元氣血兩虛有痰痛風時作陰火間起小便白濁或帶下赤白方在前痛風中一人便濁常有半年或時夢遺形瘦作心虛主治珍珠粉丸和勻定志丸服一婦人年近六十形肥奉養膏粱飲食肥美中焦不清濁氣流入膀胱下注白濁白濁即是濕痰也戴云斷用二陳湯去痰加升麻柴胡升胃中之清氣加蒼朮去濕白朮補胃全在活法服四帖後濁減大半覺胸滿因柴胡升麻升動其氣痰阻滿閉用二陳湯加炒曲白朮素無痰者升動胃氣不滿丸藥方青黛椿皮蛤粉滑石乾薑炒黃柏炒上為末炒神麯糊丸仍用前燥濕痰丸亦能治帶又方滑石利竅黃柏治濕熱青黛解鬱結蛤粉鹹寒入腎炒乾姜味苦斂肺氣下降使陰血生乾薑鹽制之淋皆屬於痰熱淋者小便淋漓欲去不去不去又來皆屬於熱也解熱利小便山梔子之類用苦甘草煎服諸藥中皆加牛膝老人亦有氣虛者人參白朮中帶木通山梔亦有死血作淋者以牛膝作膏此證亦能損胃不食小便不通氣虛血虛痰風閉實熱吐之以提其氣氣升則水自下之蓋氣承載其水也氣虛用人參黃耆升麻等先服後吐或參耆藥中探吐血虛四物湯先服後吐芎歸湯吐亦可痰多二陳湯先服後吐皆用探吐痰氣閉塞二陳湯加木香香附探吐實熱利之一婦人脾痛後患大小便不通此是痰隔中焦氣滯於下焦二陳湯加木通初吃後渣再煎服吐之關格戴云關格者謂膈中覺有所礙欲升不升欲降不降欲食不食此為氣之橫格也必用吐提其氣之橫格不必在出痰也有痰以二陳湯吐之吐中便有降有中氣虛不運者補氣藥中升降小便不禁屬熱屬虛戴云小便不禁出而不覺赤者有熱白者為氣虛也熱者五苓散加解毒散虛者五苓散加四物湯癇驚痰宜吐戴云痰者俗曰豬癲風者是也大率行痰為主黃連南星栝蔞半夏尋痰尋火分多少治無不愈分痰分熱有熱者以涼藥清其心有痰者必用吐藥吐用東垣安神丸此證必用吐吐後用平肝之藥青黛柴胡川芎之類健忘戴云健忘者為事有始無終言談不知首尾此以為病之名非比生成之愚頑不知世事者精神短少者多亦有痰者怔忡大段屬血虛有慮便動屬虛時作時止痰因火動戴云怔忡者心中不安惕惕然如人將捕者是也瘦人多是血少肥人屬痰尋常者多是痰真覺心跳者是血少用四物安神之類驚悸血虛用硃砂安神丸痓大率與癇病相似多是血虛有火兼痰人參竹瀝之類不用兼風藥血塊一名積瘕塊在中為痰飲在右為食積在左為血積氣不能作塊成聚塊乃有形之物痰與食積死血此理曉然醋煮海石三稜莪朮桃仁紅花五靈脂香附之類白朮湯吞下瓦龍子能消血塊次消痰治塊當降火消食積食積即痰也行死血塊去須大補石鹼一物有痰積有血塊可用洗滌垢膩又消食積吐蟲以黑錫炒成灰檳榔末米飲調下癥瘕戴云積聚癥瘕有積聚成塊不能移動者是癥或有或無或上或下或左或右者是瘕用蜀葵根煎湯煎人參白朮陳皮青皮甘草梢牛膝成湯入細研桃仁玄明粉各少許熱飲一服可見塊下病重補接之後加減再行消塊丸即千金大硝石丸只可磨塊不令人困須量虛實而用可也硝石六兩大黃八兩人參甘草各三兩上為末以三年苦酒三斗置銅器中以竹片作準每入一升作一刻拄器中熬先納大黃不住手攪使微沸盡一刻乃下余藥又盡一刻微火熬使可丸則取丸如雞子中黃大每服一丸米飲下如不能大丸則作小丸如梧子大每服三十丸後下如雞肝如米泔赤黑等色下後忌風冷淡軟粥將理又三聖膏未化石灰半斤為末瓦器中炒令淡紅色提出火外候熱少減次下大黃末大黃一兩為末就爐炒伺熱減入桂心末桂心半兩為末略炒入米醋熬成膏藥厚攤貼患處貼積聚塊大黃朴硝各一兩上為末用大蒜搗膏和勻貼之痞塊在皮裡膜外須用補氣香附開之兼二陳湯加補氣藥先須斷厚味茶癖石膏黃芩升麻上為末砂糖水調服癭氣先須斷厚味海藻一兩黃藥二兩上為末以少許置於掌中時時舐之津咽下如消三分之二須止後藥服食積一方乃在婦人門食積條下疝濕熱痰積流下作痛大概因寒鬱而作也即是痰飲食積並死血戴云疝本屬厥陰肝之一經余嘗見俗說小腸膀胱下部氣者皆妄言也子和云疝本肝經宜通勿塞只此見治之法專主肝經與腎絶無干不宜下㿗濕多疝氣灸大敦穴食積與瘀血成痛者梔子桃仁山楂枳實吳茱萸上為末生薑汁順流水作湯調服按之不定必用桂枝屬虛桂枝山梔炒烏頭細切炒上為末薑汁為丸每服三十丸劫痛治疝方定痛速效濕勝者加荔枝枳殼十五個山梔炒糖球炒茱萸炒又方守丸治㿗要藥不疼者蒼朮南星白芷山楂川芎半夏枳實為末神麯作丸治陽明受濕熱傳入大腸惡寒發熱小腹連毛際結核悶痛不可忍山梔炒枳殼炒桃仁炒山楂等分上研細砂鉢內入生薑汁用水一盞煎令沸熱服之治諸疝發時用海石香附二味為末以生薑汁湯調服亦能治心痛治疝方梔子桃仁橘核茱萸川烏上碾煎服劫藥用烏頭細切炒梔子橘核散單止痛腳氣蒼朮鹽炒白朮防己檳榔川芎犀角甘草木通黃連生地黃酒炒黃柏有熱加黃芩黃連有熱加竹瀝薑汁大熱及時令熱加石膏大便實加桃仁小便澀加牛膝有食積流注蒼朮黃柏防己南星川芎白芷犀角檳榔血虛加牛膝龜板如常腫者專主乎濕熱朱先生有方肥人加痰藥戴云有腳氣衝心宜四物加炒柏再宜湧泉穴用附子津拌貼以艾灸泄引其熱健步丸歸尾芍藥陳皮蒼朮各一兩生地黃一兩半大腹子三個牛膝茱萸各半兩黃芩半兩桂枝二錢上為末蒸餅為丸每服百丸白朮通草煎湯食前下一婦人足腫黃柏蒼朮南星紅花酒洗草龍膽川芎牛膝酒洗生地黃筋動於足大指動上來至大腿近腰結奉養厚因風寒作四物湯加酒芩紅花蒼朮南星筋轉皆屬乎血熱四物湯加酒芩紅花大病虛脫本是陰虛用艾灸丹田者所以補陽陽生則陰生故也不可用附子可用參多服痿斷不可作風治而用風藥濕熱痰無血而虛氣弱瘀血濕熱東垣健步方中加燥濕降陰火藥芩柏蒼朮之類濕痰二陳湯中加蒼朮黃芩黃柏白朮之類入竹瀝氣虛四君子湯加蒼朮黃芩黃柏之類血虛四物湯中蒼朮黃柏下補陰丸亦有食積妨礙不得降者亦有死血者健步丸方羌活柴胡滑石甘草炙天花粉酒製各半兩防己防風澤瀉各三錢肉桂半錢川烏苦參酒製各一錢上為末酒糊丸如桐子大每服七十丸煎愈風湯以空心下發熱陰虛難治戴云凡脈數而無力者便是陰虛也陰虛發熱用四物湯加黃柏兼氣虛加參耆白朮蓋四物湯加黃柏是降火補陰之妙藥又云陰虛發熱用四物湯甚者加龜板炒黃柏吃酒人發熱者難治不飲酒之人若因酒而發熱者亦難治一男子年三十歲因酒發熱用青黛栝蔞仁薑汁每日以數匙入口中三日而愈陽虛惡寒戴云凡背惡寒甚者脈浮大而無力者是陽虛也用人參黃耆之類甚者加附子少許以行參耆之氣一女子惡寒用苦參一錢赤小豆一錢為末齏水吐用川芎蒼朮南星黃芩酒麴丸手心熱梔子香附蒼朮白芷川芎半夏生用為末曲糊丸手麻此是氣虛也手木東垣云麻木氣不行也補肺中之氣是濕痰死血十指麻是胃中有濕痰死血厥因痰用白朮竹瀝厥者手足冷也熱厥逆也非寒證因氣虛血虛熱承氣湯外感解散加薑汁酒面寒面熱火起寒鬱熱面寒退胃熱喉痹大概多是痰熱也只以桐油吐之或用麝干逆流水吐又方用李實根皮一片噙口內更用李實根碾水敷項上一遭立效新採園中者纏喉風戴云屬痰熱纏喉風者謂其咽喉裡外皆腫者是也用桐油以鵝翎探吐又法用燈油腳探吐之又方用遠志去心水調敷項上一遭立效咽喉生瘡多屬虛血熱遊行無制客於咽喉人參蜜炙黃柏荊芥虛人參竹瀝無實火熱黃連荊芥薄荷硝石上為細末用蜜薑汁調噙血虛四物湯中加竹瀝口瘡服涼藥不愈者此中焦氣不足虛火泛上無制用理中湯甚者加附子或噙官桂亦可又方用西瓜漿水口痛甚者以此徐徐飲之冬月紫榴皮燒灰噙之酒皻鼻血熱入肺四物湯加陳皮紅花酒炒黃芩煎入好酒數滴就炒五靈脂末服效又用桐油入黃連以天吊藤燒油熱敷之肺癰已破入風者不治搜風湯吐之出醫壘元戎收斂瘡口止有合歡樹皮白蘞煎湯飲之肺痿專主養肺養血養氣清金天疱瘡通聖散及蚯蚓泥略炒蜜調敷之妙從肚皮上起者裡熱發外還服通聖散可也漏瘡須先服補藥以生氣血即參耆朮歸芎為主大劑服之外以附子末唾和作餅如錢厚以艾炷灸之漏大艾炷亦大漏小艾炷亦小但灸令微熱不可令痛干則易之乾研為末再和再灸如困則止來日如前法再灸直至肉平為效亦有用附片灸仍前氣血藥作膏藥貼之痔漏用五倍子朴硝桑寄生蓮房煎湯先熏後洗腫者用木鱉子五倍子研細末調敷漏專以涼藥為主痔漏方人參黃耆當歸川芎升麻枳殼條芩槐角腸癰作濕熱食積治入風難治治漏外塞藥蘆甘石小便煅牡礪粉結核或在頸在項在身在臂如腫毒者多痰注作核不散治耳後頂門各一塊殭蠶炒青黛膽星酒大黃上為末蜜丸噙化之頸頰下生痰核二陳湯加炒大黃連翹桔梗柴胡治臂核作痛連翹防風川芎酒芩蒼朮皂角刺治環跳穴痛防生附骨癰方以蒼朮佐黃柏之辛行以青皮冬月加桂枝夏月加條子黃芩體虛者加土牛膝以生甘草為使大料煎入生薑汁帶辣食前飲之病甚者加黃柏桂枝十數帖發不動少加大黃一兩帖又不動者恐癰將成矣急撅地成坑以火煅紅沃以小便赤體坐其上以被席圍抱下體伏熱氣熏蒸腠理開血氣暢而愈脫肛氣熱氣虛氣虛補氣用人參當歸黃耆川芎升麻血虛者四物湯血熱者涼血四物湯加黃柏炒
